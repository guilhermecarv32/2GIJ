<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2GIJ — Módulo 1: Canvas e Sistema de Coordenadas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: transparent; }
  #app { width: 100%; height: 580px; display: flex; flex-direction: column; background: #0d0d0d; border-radius: 12px; overflow: hidden; border: 0.5px solid #2a2a2a; }
  #toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #111; border-bottom: 0.5px solid #252525; flex-wrap: wrap; }
  .tb-group { display: flex; align-items: center; gap: 4px; padding: 0 6px; border-right: 0.5px solid #2a2a2a; }
  .tb-group:last-child { border-right: none; margin-left: auto; }
  .tb-btn { width: 30px; height: 30px; border-radius: 6px; border: 0.5px solid transparent; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; transition: all .15s; font-size: 14px; }
  .tb-btn:hover { background: #1e1e1e; color: #ccc; border-color: #333; }
  .tb-btn.active { background: #1a2a3a; color: #4a9eff; border-color: #2a4a6a; }
  .tb-btn.calib { color: #f0a030; }
  .tb-btn.calib.active { background: #2a1a00; color: #ffb940; border-color: #5a3a00; }
  .tb-label { font-size: 11px; color: #555; padding: 0 4px; white-space: nowrap; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; cursor: crosshair; background: #0a0a0a; }
  #canvas-wrap.tool-pencil { cursor: crosshair; }
  #canvas-wrap.tool-line, #canvas-wrap.tool-rect, #canvas-wrap.tool-circle { cursor: crosshair; }
  #canvas-wrap.tool-select { cursor: default; }
  #canvas-wrap.tool-pan { cursor: grab; }
  #canvas-wrap.tool-pan.panning { cursor: grabbing; }
  #canvas-wrap.tool-calibrate { cursor: none; }
  #main-canvas { position: absolute; top: 0; left: 0; }
  #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #cursor-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #status-bar { display: flex; align-items: center; gap: 16px; padding: 5px 12px; background: #0e0e0e; border-top: 0.5px solid #1e1e1e; font-size: 11px; color: #444; }
  .status-item { display: flex; align-items: center; gap: 4px; }
  .status-val { color: #666; font-variant-numeric: tabular-nums; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #2a6a2a; }
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 999; }
  #modal-bg.hidden { display: none; }
  #modal { background: #141414; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 24px; width: 320px; }
  #modal h3 { color: #ccc; font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  #modal p { color: #555; font-size: 12px; margin-bottom: 16px; line-height: 1.5; }
  #modal input { width: 100%; background: #0d0d0d; border: 0.5px solid #333; border-radius: 6px; color: #ccc; padding: 8px 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
  #modal input:focus { border-color: #4a6a8a; }
  #modal .row { display: flex; gap: 8px; }
  #modal button { flex: 1; padding: 8px; border-radius: 6px; border: 0.5px solid #333; cursor: pointer; font-size: 13px; transition: all .15s; }
  #modal .btn-ok { background: #1a3a5a; color: #4a9eff; border-color: #2a5a8a; }
  #modal .btn-ok:hover { background: #1e4a70; }
  #modal .btn-cancel { background: transparent; color: #666; }
  #modal .btn-cancel:hover { background: #1a1a1a; color: #888; }
  .layer-badge { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .layer-floor { background: #1a2a1a; color: #4a8a4a; }
  .layer-wifi { background: #1a1a2a; color: #4a4aaa; }
  #info-panel { position: absolute; top: 10px; right: 10px; background: rgba(10,10,10,.85); border: 0.5px solid #222; border-radius: 8px; padding: 10px 12px; font-size: 11px; color: #444; min-width: 160px; pointer-events: none; }
  #info-panel .info-row { display: flex; justify-content: space-between; gap: 16px; line-height: 1.8; }
  #info-panel .info-val { color: #666; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <div class="tb-group">
      <span class="tb-label">FERRAMENTAS</span>
      <button class="tb-btn" id="btn-select" title="Selecionar (V)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l4 10 2-4 4-2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </button>
      <button class="tb-btn active" id="btn-pencil" title="Lápis (P)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2-7 7-2.5.5.5-2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-line" title="Linha (L)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="2" y1="12" x2="12" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-rect" title="Retângulo (R)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="tb-btn" id="btn-circle" title="Círculo (C)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
    <div class="tb-group">
      <span class="tb-label">NAVEGAÇÃO</span>
      <button class="tb-btn" id="btn-pan" title="Mover canvas (Space)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v2M7 10v2M2 7h2M10 7h2M4.5 4.5l1 1M8.5 8.5l1 1M8.5 4.5l-1 1M4.5 8.5l-1 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-zoom-in" title="Zoom In (+)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.2"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="6" y1="4" x2="6" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-zoom-out" title="Zoom Out (-)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.2"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-fit" title="Ajustar à tela">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5V2h3M9 2h3v3M12 9v3H9M5 12H2V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="tb-group">
      <span class="tb-label">CAMADAS</span>
      <button class="tb-btn active" id="btn-layer-floor" title="Camada Planta">
        <span class="layer-badge layer-floor">PL</span>
      </button>
      <button class="tb-btn" id="btn-layer-wifi" title="Camada Wi-Fi">
        <span class="layer-badge layer-wifi">WF</span>
      </button>
    </div>
    <div class="tb-group">
      <button class="tb-btn calib" id="btn-calib" title="Calibrar Espaço">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="1" y1="4" x2="1" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="4" x2="13" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="4" y1="5" x2="4" y2="9" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".6"/><line x1="7" y1="5" x2="7" y2="9" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".6"/><line x1="10" y1="5" x2="10" y2="9" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".6"/></svg>
      </button>
      <span class="tb-label" id="calib-label">Calibrar</span>
    </div>
    <div class="tb-group">
      <button class="tb-btn" id="btn-clear" title="Limpar canvas">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-export" title="Exportar dados JSON">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 10v2h10v-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div id="canvas-wrap" class="tool-pencil">
    <canvas id="main-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <canvas id="cursor-canvas"></canvas>
    <div id="info-panel">
      <div class="info-row"><span>Cursor</span><span class="info-val" id="inf-pos">0, 0 cm</span></div>
      <div class="info-row"><span>Zoom</span><span class="info-val" id="inf-zoom">100%</span></div>
      <div class="info-row"><span>Escala</span><span class="info-val" id="inf-scale">— cm/px</span></div>
      <div class="info-row"><span>Geometrias</span><span class="info-val" id="inf-geom">0</span></div>
      <div class="info-row"><span>Pontos Wi-Fi</span><span class="info-val" id="inf-wifi">0</span></div>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-item"><div class="dot"></div><span>2GIJ v0.1</span></div>
    <div class="status-item"><span>Camada:</span><span class="status-val" id="st-layer">Planta</span></div>
    <div class="status-item"><span>Ferramenta:</span><span class="status-val" id="st-tool">Lápis</span></div>
    <div class="status-item"><span>Objetos:</span><span class="status-val" id="st-count">0</span></div>
    <div class="status-item" style="margin-left:auto"><span id="st-msg" style="color:#4a8a4a">Pronto</span></div>
  </div>
</div>

<div id="modal-bg" class="hidden">
  <div id="modal">
    <h3 id="modal-title">Calibrar Espaço</h3>
    <p id="modal-desc">Distância entre os dois pontos marcados em centímetros:</p>
    <input type="number" id="modal-input" placeholder="Ex: 500" min="1" step="1">
    <div class="row">
      <button class="btn-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-ok" id="modal-ok">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
const wrap    = document.getElementById('canvas-wrap');
const mainC   = document.getElementById('main-canvas');
const ovC     = document.getElementById('overlay-canvas');
const curC    = document.getElementById('cursor-canvas');
const mCtx    = mainC.getContext('2d');
const ovCtx   = ovC.getContext('2d');
const curCtx  = curC.getContext('2d');

// ─────────────────────────────────────────────
// ESTADO GLOBAL DO PROJETO
// ─────────────────────────────────────────────
const state = {
  project: {
    id: crypto.randomUUID ? crypto.randomUUID() : '2gij-' + Date.now(),
    name: '2GIJ',
    scaleRatio: null,       // cm por pixel
    drawings: [],           // Array<Geometry>
    scanPoints: []          // Array<ScanPoint>
  },
  tool: 'pencil',           // ferramenta ativa
  layer: 'floor',           // camada ativa: 'floor' | 'wifi'
  zoom: 1,
  panX: 0,
  panY: 0,
  drawing: false,
  panning: false,
  lastPan: null,
  currentPath: [],          // pontos do traçado freehand em andamento
  startPt: null,            // ponto inicial para linha/rect/circle
  calibMode: false,         // modo calibração ativo
  calibPts: [],             // pontos clicados durante calibração
  mouseX: 0,
  mouseY: 0
};

// Cores por camada
const COLORS = {
  floor: '#aaaaaa',
  wifi:  '#4a6aff',
  calib: '#ffb940'
};

// ─────────────────────────────────────────────
// REDIMENSIONAMENTO
// ─────────────────────────────────────────────
function resize() {
  const r = wrap.getBoundingClientRect();
  [mainC, ovC, curC].forEach(c => {
    c.width = r.width;
    c.height = r.height;
  });
  redraw();
}

// ─────────────────────────────────────────────
// SISTEMA DE COORDENADAS
// Converte entre espaço de tela (px) e mundo (px)
// e mundo (px) → centímetros via scaleRatio
// ─────────────────────────────────────────────
function toWorld(cx, cy) {
  return [(cx - state.panX) / state.zoom,
          (cy - state.panY) / state.zoom];
}

function toScreen(wx, wy) {
  return [wx * state.zoom + state.panX,
          wy * state.zoom + state.panY];
}

function toCM(wx, wy) {
  if (!state.project.scaleRatio) {
    return [wx.toFixed(0) + 'px', wy.toFixed(0) + 'px'];
  }
  return [
    (wx * state.project.scaleRatio).toFixed(1),
    (wy * state.project.scaleRatio).toFixed(1)
  ];
}

// ─────────────────────────────────────────────
// DESENHO: GRID DE REFERÊNCIA
// ─────────────────────────────────────────────
function drawGrid(ctx) {
  const gridSize = 50;
  const w = ctx.canvas.width;
  const h = ctx.canvas.height;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  const startX = state.panX % (gridSize * state.zoom);
  const startY = state.panY % (gridSize * state.zoom);
  for (let x = startX; x < w; x += gridSize * state.zoom) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = startY; y < h; y += gridSize * state.zoom) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// DESENHO: GEOMETRIAS SALVAS
// Suporta: pencil | line | rect | circle
// ─────────────────────────────────────────────
function drawGeometry(ctx, g) {
  ctx.save();
  ctx.strokeStyle = g.layer === 'floor' ? COLORS.floor : COLORS.wifi;
  ctx.lineWidth   = (g.layer === 'floor' ? 1.5 : 2) / state.zoom;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  if (g.type === 'pencil' && g.points.length > 1) {
    ctx.beginPath();
    ctx.moveTo(g.points[0][0], g.points[0][1]);
    for (let i = 1; i < g.points.length; i++) {
      ctx.lineTo(g.points[i][0], g.points[i][1]);
    }
    ctx.stroke();
  } else if (g.type === 'line') {
    ctx.beginPath();
    ctx.moveTo(g.x1, g.y1);
    ctx.lineTo(g.x2, g.y2);
    ctx.stroke();
  } else if (g.type === 'rect') {
    ctx.beginPath();
    ctx.strokeRect(g.x, g.y, g.w, g.h);
  } else if (g.type === 'circle') {
    ctx.beginPath();
    ctx.arc(g.cx, g.cy, g.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// DESENHO: LINHA DE CALIBRAÇÃO (preview)
// ─────────────────────────────────────────────
function drawCalibLine(ctx) {
  if (state.calibPts.length === 0) return;
  ctx.save();
  ctx.strokeStyle = COLORS.calib;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 3]);
  const [sx, sy] = toScreen(state.calibPts[0][0], state.calibPts[0][1]);
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  if (state.calibPts.length === 2) {
    const [ex, ey] = toScreen(state.calibPts[1][0], state.calibPts[1][1]);
    ctx.lineTo(ex, ey);
  } else {
    ctx.lineTo(state.mouseX, state.mouseY);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  // pontos de ancora
  state.calibPts.forEach(([px, py]) => {
    const [scx, scy] = toScreen(px, py);
    ctx.beginPath();
    ctx.arc(scx, scy, 4, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.calib;
    ctx.fill();
  });
  ctx.restore();
}

// ─────────────────────────────────────────────
// REDRAW COMPLETO (canvas principal)
// ─────────────────────────────────────────────
function redraw() {
  const w = mainC.width;
  const h = mainC.height;
  mCtx.clearRect(0, 0, w, h);
  mCtx.fillStyle = '#0a0a0a';
  mCtx.fillRect(0, 0, w, h);
  drawGrid(mCtx);
  // aplica transformação de câmera
  mCtx.save();
  mCtx.translate(state.panX, state.panY);
  mCtx.scale(state.zoom, state.zoom);
  state.project.drawings.forEach(g => drawGeometry(mCtx, g));
  mCtx.restore();
  updateInfo();
}

// ─────────────────────────────────────────────
// OVERLAY (preview da forma em construção)
// ─────────────────────────────────────────────
function drawOverlay(wx, wy) {
  ovCtx.clearRect(0, 0, ovC.width, ovC.height);
  if (!state.drawing || !state.startPt) return;
  const [sx, sy] = toScreen(state.startPt[0], state.startPt[1]);
  const [ex, ey] = toScreen(wx, wy);
  ovCtx.save();
  ovCtx.strokeStyle = state.layer === 'floor' ? COLORS.floor : COLORS.wifi;
  ovCtx.lineWidth = 1.5;
  ovCtx.lineCap = 'round';
  ovCtx.lineJoin = 'round';
  if (state.tool === 'line') {
    ovCtx.beginPath();
    ovCtx.moveTo(sx, sy);
    ovCtx.lineTo(ex, ey);
    ovCtx.stroke();
  } else if (state.tool === 'rect') {
    ovCtx.strokeRect(sx, sy, ex - sx, ey - sy);
  } else if (state.tool === 'circle') {
    const r = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2);
    ovCtx.beginPath();
    ovCtx.arc(sx, sy, r, 0, Math.PI * 2);
    ovCtx.stroke();
  }
  ovCtx.restore();
  if (state.calibMode) drawCalibLine(ovCtx);
}

// ─────────────────────────────────────────────
// CURSOR CUSTOMIZADO (modo calibração)
// ─────────────────────────────────────────────
function drawCursor(mx, my) {
  curCtx.clearRect(0, 0, curC.width, curC.height);
  if (!state.calibMode) return;
  curCtx.save();
  curCtx.strokeStyle = COLORS.calib;
  curCtx.lineWidth = 1;
  curCtx.setLineDash([4, 3]);
  // linha vertical
  curCtx.beginPath();
  curCtx.moveTo(mx, 0);
  curCtx.lineTo(mx, curC.height);
  curCtx.stroke();
  // linha horizontal
  curCtx.beginPath();
  curCtx.moveTo(0, my);
  curCtx.lineTo(curC.width, my);
  curCtx.stroke();
  // circulo central
  curCtx.setLineDash([]);
  curCtx.beginPath();
  curCtx.arc(mx, my, 5, 0, Math.PI * 2);
  curCtx.strokeStyle = COLORS.calib;
  curCtx.stroke();
  curCtx.restore();
}

// ─────────────────────────────────────────────
// UTILITÁRIOS
// ─────────────────────────────────────────────
function getPos(e) {
  const r = wrap.getBoundingClientRect();
  const cx = (e.clientX || e.touches?.[0]?.clientX || 0) - r.left;
  const cy = (e.clientY || e.touches?.[0]?.clientY || 0) - r.top;
  return [cx, cy];
}

function updateInfo() {
  const [wx, wy] = toWorld(state.mouseX, state.mouseY);
  const cm = toCM(wx, wy);
  const scaleStr = state.project.scaleRatio
    ? state.project.scaleRatio.toFixed(4) : '—';
  document.getElementById('inf-pos').textContent = state.project.scaleRatio
    ? `${cm[0]}, ${cm[1]} cm`
    : `${wx.toFixed(0)}, ${wy.toFixed(0)} px`;
  document.getElementById('inf-zoom').textContent =
    Math.round(state.zoom * 100) + '%';
  document.getElementById('inf-scale').textContent =
    scaleStr !== '—' ? scaleStr + ' cm/px' : '— cm/px';
  document.getElementById('inf-geom').textContent =
    state.project.drawings.length;
  document.getElementById('inf-wifi').textContent =
    state.project.scanPoints.length;
  document.getElementById('st-count').textContent =
    state.project.drawings.length;
  // atualiza label de calibração na toolbar
  const calibLabel = document.getElementById('calib-label');
  if (state.project.scaleRatio) {
    calibLabel.textContent = state.project.scaleRatio.toFixed(3) + ' cm/px';
    calibLabel.style.color = '#ffb940';
  } else {
    calibLabel.textContent = 'Calibrar';
    calibLabel.style.color = '';
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('st-msg');
  el.textContent = msg;
  el.style.color = color || '#4a8a4a';
}

// ─────────────────────────────────────────────
// EVENTOS DE MOUSE
// ─────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  const [cx, cy] = getPos(e);
  const [wx, wy] = toWorld(cx, cy);

  // PAN com botão do meio ou ferramenta pan
  if (state.tool === 'pan' || e.button === 1) {
    state.panning = true;
    state.lastPan = [cx, cy];
    wrap.classList.add('panning');
    return;
  }

  // MODO CALIBRAÇÃO
  if (state.calibMode) {
    state.calibPts.push([wx, wy]);
    if (state.calibPts.length === 2) {
      // Dois pontos definidos — calcula distância em pixels e abre modal
      const dx = state.calibPts[1][0] - state.calibPts[0][0];
      const dy = state.calibPts[1][1] - state.calibPts[0][1];
      const pixDist = Math.sqrt(dx * dx + dy * dy);
      document.getElementById('modal-input').value = '';
      document.getElementById('modal-title').textContent = 'Calibrar Espaço';
      document.getElementById('modal-desc').textContent =
        `Distância medida: ${pixDist.toFixed(1)} px. Defina o valor real em centímetros:`;
      document.getElementById('modal-bg').classList.remove('hidden');
      window._calibPixDist = pixDist;
    }
    ovCtx.clearRect(0, 0, ovC.width, ovC.height);
    drawCalibLine(ovCtx);
    return;
  }

  // FERRAMENTAS DE DESENHO
  if (state.tool === 'pencil') {
    state.drawing = true;
    state.currentPath = [[wx, wy]];
  } else if (['line', 'rect', 'circle'].includes(state.tool)) {
    state.drawing = true;
    state.startPt = [wx, wy];
  }
});

wrap.addEventListener('mousemove', e => {
  const [cx, cy] = getPos(e);
  state.mouseX = cx;
  state.mouseY = cy;
  const [wx, wy] = toWorld(cx, cy);

  // PAN
  if (state.panning && state.lastPan) {
    state.panX += cx - state.lastPan[0];
    state.panY += cy - state.lastPan[1];
    state.lastPan = [cx, cy];
    redraw();
    return;
  }

  drawCursor(cx, cy);
  updateInfo();

  // Preview linha de calibração
  if (state.calibMode) {
    ovCtx.clearRect(0, 0, ovC.width, ovC.height);
    drawCalibLine(ovCtx);
    return;
  }

  if (!state.drawing) return;

  // Lápis: desenha incrementalmente no canvas principal
  if (state.tool === 'pencil') {
    state.currentPath.push([wx, wy]);
    mCtx.save();
    mCtx.translate(state.panX, state.panY);
    mCtx.scale(state.zoom, state.zoom);
    const pts = state.currentPath;
    if (pts.length > 1) {
      mCtx.beginPath();
      mCtx.strokeStyle = state.layer === 'floor' ? COLORS.floor : COLORS.wifi;
      mCtx.lineWidth = 1.5 / state.zoom;
      mCtx.lineCap = 'round';
      mCtx.lineJoin = 'round';
      mCtx.moveTo(pts[pts.length - 2][0], pts[pts.length - 2][1]);
      mCtx.lineTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
      mCtx.stroke();
    }
    mCtx.restore();
  } else {
    // Formas vetoriais: preview no overlay
    drawOverlay(wx, wy);
  }
});

wrap.addEventListener('mouseup', e => {
  if (state.panning) {
    state.panning = false;
    wrap.classList.remove('panning');
    return;
  }
  if (!state.drawing) return;

  const [cx, cy] = getPos(e);
  const [wx, wy] = toWorld(cx, cy);

  // Finaliza e salva a geometria na estrutura de dados do projeto
  if (state.tool === 'pencil' && state.currentPath.length > 1) {
    state.project.drawings.push({
      id: Date.now(),
      type: 'pencil',
      layer: state.layer,
      points: [...state.currentPath]
    });
    setStatus(`Traçado adicionado (${state.currentPath.length} pts)`);
  } else if (state.tool === 'line' && state.startPt) {
    state.project.drawings.push({
      id: Date.now(), type: 'line', layer: state.layer,
      x1: state.startPt[0], y1: state.startPt[1], x2: wx, y2: wy
    });
    setStatus('Linha adicionada');
  } else if (state.tool === 'rect' && state.startPt) {
    state.project.drawings.push({
      id: Date.now(), type: 'rect', layer: state.layer,
      x: state.startPt[0], y: state.startPt[1],
      w: wx - state.startPt[0], h: wy - state.startPt[1]
    });
    setStatus('Retângulo adicionado');
  } else if (state.tool === 'circle' && state.startPt) {
    const r = Math.sqrt(
      (wx - state.startPt[0]) ** 2 + (wy - state.startPt[1]) ** 2
    );
    state.project.drawings.push({
      id: Date.now(), type: 'circle', layer: state.layer,
      cx: state.startPt[0], cy: state.startPt[1], r
    });
    setStatus('Círculo adicionado');
  }

  state.drawing = false;
  state.currentPath = [];
  state.startPt = null;
  ovCtx.clearRect(0, 0, ovC.width, ovC.height);
  redraw();
});

// ZOOM com roda do mouse (ancora no ponto do cursor)
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const [cx, cy] = getPos(e);
  const [wx, wy] = toWorld(cx, cy);
  const delta = e.deltaY > 0 ? 0.85 : 1.18;
  state.zoom = Math.max(0.1, Math.min(20, state.zoom * delta));
  // recalcula pan para manter o ponto do cursor fixo
  state.panX = cx - wx * state.zoom;
  state.panY = cy - wy * state.zoom;
  redraw();
}, { passive: false });

wrap.addEventListener('mouseleave', () => {
  state.panning = false;
  wrap.classList.remove('panning');
  curCtx.clearRect(0, 0, curC.width, curC.height);
});

// ─────────────────────────────────────────────
// TOOLBAR — FERRAMENTAS
// ─────────────────────────────────────────────
function setTool(tool, label) {
  state.tool = tool;
  document.querySelectorAll('.tb-btn[id^=btn-]').forEach(b =>
    b.classList.remove('active')
  );
  const map = {
    pencil: 'btn-pencil', line: 'btn-line', rect: 'btn-rect',
    circle: 'btn-circle', pan: 'btn-pan', select: 'btn-select'
  };
  if (map[tool]) document.getElementById(map[tool]).classList.add('active');
  wrap.className = 'tool-' + tool;
  document.getElementById('st-tool').textContent = label;
  setStatus('Ferramenta: ' + label);
}

document.getElementById('btn-pencil').onclick = () => setTool('pencil', 'Lápis');
document.getElementById('btn-line').onclick   = () => setTool('line', 'Linha');
document.getElementById('btn-rect').onclick   = () => setTool('rect', 'Retângulo');
document.getElementById('btn-circle').onclick = () => setTool('circle', 'Círculo');
document.getElementById('btn-select').onclick = () => setTool('select', 'Seleção');
document.getElementById('btn-pan').onclick    = () => setTool('pan', 'Mover');

// ─────────────────────────────────────────────
// TOOLBAR — ZOOM E PAN
// ─────────────────────────────────────────────
document.getElementById('btn-zoom-in').onclick = () => {
  const cx = mainC.width / 2, cy = mainC.height / 2;
  const [wx, wy] = toWorld(cx, cy);
  state.zoom = Math.min(20, state.zoom * 1.3);
  state.panX = cx - wx * state.zoom;
  state.panY = cy - wy * state.zoom;
  redraw();
};
document.getElementById('btn-zoom-out').onclick = () => {
  const cx = mainC.width / 2, cy = mainC.height / 2;
  const [wx, wy] = toWorld(cx, cy);
  state.zoom = Math.max(0.1, state.zoom * 0.77);
  state.panX = cx - wx * state.zoom;
  state.panY = cy - wy * state.zoom;
  redraw();
};
document.getElementById('btn-fit').onclick = () => {
  state.zoom = 1; state.panX = 0; state.panY = 0; redraw();
};

// ─────────────────────────────────────────────
// TOOLBAR — CAMADAS
// ─────────────────────────────────────────────
document.getElementById('btn-layer-floor').onclick = () => {
  state.layer = 'floor';
  document.getElementById('btn-layer-floor').classList.add('active');
  document.getElementById('btn-layer-wifi').classList.remove('active');
  document.getElementById('st-layer').textContent = 'Planta';
  setStatus('Camada: Planta baixa');
};
document.getElementById('btn-layer-wifi').onclick = () => {
  state.layer = 'wifi';
  document.getElementById('btn-layer-wifi').classList.add('active');
  document.getElementById('btn-layer-floor').classList.remove('active');
  document.getElementById('st-layer').textContent = 'Wi-Fi';
  setStatus('Camada: Pontos Wi-Fi', '#4a6aff');
};

// ─────────────────────────────────────────────
// CALIBRAÇÃO DE ESCALA
// ─────────────────────────────────────────────
document.getElementById('btn-calib').onclick = () => {
  state.calibMode = !state.calibMode;
  state.calibPts = [];
  document.getElementById('btn-calib').classList.toggle('active', state.calibMode);
  if (state.calibMode) {
    wrap.classList.add('tool-calibrate');
    setStatus('Calibração: clique em 2 pontos para medir', '#ffb940');
  } else {
    wrap.className = 'tool-' + state.tool;
    ovCtx.clearRect(0, 0, ovC.width, ovC.height);
    curCtx.clearRect(0, 0, curC.width, curC.height);
    setStatus('Calibração cancelada');
  }
};

// ─────────────────────────────────────────────
// AÇÕES GERAIS
// ─────────────────────────────────────────────
document.getElementById('btn-clear').onclick = () => {
  state.project.drawings = [];
  state.project.scanPoints = [];
  redraw();
  setStatus('Canvas limpo');
};

document.getElementById('btn-export').onclick = () => {
  const data = JSON.stringify(state.project, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '2gij-project.json';
  a.click();
  setStatus('Projeto exportado como JSON', '#4a9eff');
};

// ─────────────────────────────────────────────
// MODAL DE CALIBRAÇÃO
// ─────────────────────────────────────────────
document.getElementById('modal-ok').onclick = () => {
  const val = parseFloat(document.getElementById('modal-input').value);
  if (val > 0 && window._calibPixDist > 0) {
    // scaleRatio = cm reais / pixels medidos
    state.project.scaleRatio = val / window._calibPixDist;
    setStatus(
      `Calibrado: 1px = ${state.project.scaleRatio.toFixed(4)} cm`,
      '#ffb940'
    );
  }
  document.getElementById('modal-bg').classList.add('hidden');
  state.calibMode = false;
  state.calibPts = [];
  document.getElementById('btn-calib').classList.remove('active');
  wrap.className = 'tool-' + state.tool;
  ovCtx.clearRect(0, 0, ovC.width, ovC.height);
  curCtx.clearRect(0, 0, curC.width, curC.height);
  updateInfo();
};
document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('modal-bg').classList.add('hidden');
  state.calibPts = [];
  ovCtx.clearRect(0, 0, ovC.width, ovC.height);
};
document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter')  document.getElementById('modal-ok').click();
  if (e.key === 'Escape') document.getElementById('modal-cancel').click();
});

// ─────────────────────────────────────────────
// ATALHOS DE TECLADO
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'p' || e.key === 'P') setTool('pencil', 'Lápis');
  if (e.key === 'l' || e.key === 'L') setTool('line', 'Linha');
  if (e.key === 'r' || e.key === 'R') setTool('rect', 'Retângulo');
  if (e.key === 'c' || e.key === 'C') setTool('circle', 'Círculo');
  if (e.key === 'v' || e.key === 'V') setTool('select', 'Seleção');
  if (e.key === ' ') { e.preventDefault(); setTool('pan', 'Mover'); }
  if (e.key === '+' || e.key === '=') document.getElementById('btn-zoom-in').click();
  if (e.key === '-') document.getElementById('btn-zoom-out').click();
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    state.project.drawings.pop();
    redraw();
    setStatus('Desfeito');
  }
  if (e.key === 'Escape') {
    state.drawing = false;
    state.currentPath = [];
    state.startPt = null;
    if (state.calibMode) document.getElementById('btn-calib').click();
    ovCtx.clearRect(0, 0, ovC.width, ovC.height);
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
const ro = new ResizeObserver(resize);
ro.observe(wrap);
resize();
setStatus('Pronto — desenhe a planta ou calibre o espaço');
</script>
</body>
</html>
